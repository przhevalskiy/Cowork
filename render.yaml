# Render Blueprint - Infrastructure as Code
# This file defines all services for the Cowork application
# Deploy: Connect GitHub repo to Render, it auto-detects this file

services:
  # Backend - FastAPI Python Service
  - type: web
    name: cowork-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Supabase Database & Auth
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # AI Provider API Keys
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      # Hive integration
      - key: HIVE_API_KEY
        sync: false
      - key: HIVE_USER_ID
        sync: false
      - key: HIVE_WORKSPACE_ID
        sync: false
      - key: HIVE_UAT_PROJECT_ID
        sync: false
      # Email copies (Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_CC_ADDRESS
        sync: false
      # Application Configuration
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      # AI Models (optional overrides)
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: MISTRAL_MODEL
        value: mistral-large-latest

  # Frontend - Static Site with Global CDN
  - type: web
    name: cowork-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
